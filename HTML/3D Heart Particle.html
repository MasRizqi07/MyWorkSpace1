<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>3D Heart Particles</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Playfair Display', serif;
    }

    canvas {
      display: block;
    }

    #label {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 200, 200, 0.5);
      font-size: 13px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      font-style: italic;
      pointer-events: none;
      white-space: nowrap;
    }

    #click-hint {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 180, 180, 0.4);
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="label">✦ 3D Heart Particles ✦</div>
  <div id="click-hint">click to burst · hover to interact</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
});

// ── Heart parametric formula ──────────────────────────────────────────────
function heartX(t) { return 16 * Math.pow(Math.sin(t), 3); }
function heartY(t) { return -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t)); }

// ── Particle class ────────────────────────────────────────────────────────
class Particle {
  constructor() { this.reset(); }

  reset() {
    const t = Math.random() * Math.PI * 2;
    // slight radial jitter around the heart path
    const jitter = (Math.random() - 0.5) * 1.2;
    const scale = 17;

    this.ox = heartX(t) * scale + (Math.random() - 0.5) * 14;
    this.oy = heartY(t) * scale + (Math.random() - 0.5) * 14;

    // 3D-ish depth
    this.z = Math.random() * 2 - 1;          // -1 … 1

    // velocity (very subtle drift)
    this.vx = (Math.random() - 0.5) * 0.12;
    this.vy = (Math.random() - 0.5) * 0.12;
    this.vz = (Math.random() - 0.5) * 0.008;

    // colour: warm pinks → whites → rose-golds
    const palette = [
      [255, 192, 203], // pink
      [255, 160, 180], // hot-pink
      [255, 220, 220], // blush
      [255, 240, 230], // peach-white
      [255, 200, 170], // rose-gold
      [255, 255, 255], // pure white
      [255, 140, 160], // deep rose
    ];
    const c = palette[Math.floor(Math.random() * palette.length)];
    this.r = c[0]; this.g = c[1]; this.b = c[2];

    this.alpha = Math.random() * 0.6 + 0.3;
    this.targetAlpha = this.alpha;
    this.size = Math.random() * 2.2 + 0.5;

    // individual rotation phase for 3-D spin simulation
    this.phase = Math.random() * Math.PI * 2;
  }

  update(globalAngle, mouseX, mouseY, cx, cy) {
    // rotate around Y axis (3-D spin)
    const cosA = Math.cos(globalAngle);
    const sinA = Math.sin(globalAngle);
    const rx = this.ox * cosA - this.z * 60 * sinA;
    const rz = this.ox * sinA + this.z * 60 * cosA;

    // perspective projection
    const perspective = 400 / (400 + rz);
    this.sx = rx * perspective + cx;
    this.sy = this.oy * perspective + cy;
    this.sp = perspective;          // screen scale

    // mouse repel
    const dx = this.sx - mouseX;
    const dy = this.sy - mouseY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 80) {
      const force = (80 - dist) / 80;
      this.vx += (dx / dist) * force * 0.8;
      this.vy += (dy / dist) * force * 0.8;
    }

    // drift & friction
    this.vx *= 0.96;
    this.vy *= 0.96;
    this.ox += this.vx;
    this.oy += this.vy;
    this.z  += this.vz;

    // twinkle
    this.alpha += (Math.sin(Date.now() * 0.003 + this.phase) * 0.15);
    this.alpha = Math.max(0.05, Math.min(1, this.alpha));

    // depth-based fade
    const depthAlpha = (rz + 80) / 160;
    this.drawAlpha = this.alpha * Math.max(0.2, depthAlpha);
  }

  draw() {
    const s = this.size * this.sp * 1.5;
    ctx.beginPath();
    ctx.arc(this.sx, this.sy, Math.max(0.3, s), 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${this.r},${this.g},${this.b},${this.drawAlpha})`;
    ctx.fill();
  }
}

// ── Burst on click ────────────────────────────────────────────────────────
class Burst {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.particles = Array.from({length: 40}, () => ({
      vx: (Math.random()-0.5)*6,
      vy: (Math.random()-0.5)*6,
      alpha: 1,
      r: Math.random()*255|0,
      g: Math.random()*80+100|0,
      b: Math.random()*120+100|0,
      size: Math.random()*3+1,
      x, y
    }));
  }
  update() {
    this.particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.1;
      p.alpha -= 0.022;
    });
    this.particles = this.particles.filter(p => p.alpha > 0);
  }
  draw() {
    this.particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${p.alpha})`;
      ctx.fill();
    });
  }
  done() { return this.particles.length === 0; }
}

// ── Init ──────────────────────────────────────────────────────────────────
const NUM = 1800;
const particles = Array.from({length: NUM}, () => new Particle());
const bursts = [];

let angle = 0;
let mouse = { x: -999, y: -999 };

canvas.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
canvas.addEventListener('mouseleave', () => { mouse.x = -999; mouse.y = -999; });
canvas.addEventListener('click', e => bursts.push(new Burst(e.clientX, e.clientY)));

// touch
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
}, {passive: false});
canvas.addEventListener('touchend', () => { mouse.x = -999; mouse.y = -999; });

// ── Render loop ───────────────────────────────────────────────────────────
function draw() {
  // soft trail
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2;
  const cy = H / 2 + 10;

  angle += 0.008;

  particles.forEach(p => {
    p.update(angle, mouse.x, mouse.y, cx, cy);
    p.draw();
  });

  // glow pass (draw brightest particles again at low alpha for bloom)
  ctx.globalCompositeOperation = 'screen';
  particles.forEach(p => {
    if (p.drawAlpha > 0.6) {
      ctx.beginPath();
      ctx.arc(p.sx, p.sy, p.size * p.sp * 3, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},0.06)`;
      ctx.fill();
    }
  });
  ctx.globalCompositeOperation = 'source-over';

  // bursts
  for (let i = bursts.length - 1; i >= 0; i--) {
    bursts[i].update();
    bursts[i].draw();
    if (bursts[i].done()) bursts.splice(i, 1);
  }

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
