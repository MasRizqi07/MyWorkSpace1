<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Light Simulator</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
        }

        .traffic-light {
            background-color: #333;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .light {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            opacity: 0.3;
            transition: opacity 0.3s ease, box-shadow 0.3s ease;
        }

        .red {
            background-color: #ff0000;
        }

        .yellow {
            background-color: #ffff00;
        }

        .green {
            background-color: #00ff00;
        }

        .light.active {
            opacity: 1;
            box-shadow: 0 0 30px currentColor;
        }

        .red.active {
            box-shadow: 0 0 40px #ff0000;
        }

        .yellow.active {
            box-shadow: 0 0 40px #ffff00;
        }

        .green.active {
            box-shadow: 0 0 40px #00ff00;
        }

        #switchBtn {
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        #switchBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(0, 0, 0, 0.3);
        }

        #switchBtn:active {
            transform: translateY(0);
        }

        .status {
            color: white;
            font-size: 24px;
            font-weight: bold;
            margin-top: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="traffic-light">
        <div id="red" class="light red active"></div>
        <div id="yellow" class="light yellow"></div>
        <div id="green" class="light green"></div>
    </div>

    <button id="switchBtn">Switch Traffic Light</button>
    <div class="status" id="status">STOP</div>

    <script>
        let currentLight = 0;
        const lights = ['red', 'yellow', 'green'];
        const statusText = ['STOP', 'READY', 'GO'];

        function switchLight() {
            // Matikan semua lampu
            lights.forEach(light => {
                document.getElementById(light).classList.remove('active');
            });

            // Nyalakan lampu berikutnya
            currentLight = (currentLight + 1) % lights.length;
            document.getElementById(lights[currentLight]).classList.add('active');
            document.getElementById('status').textContent = statusText[currentLight];
        }

        // Event listener untuk tombol
        document.getElementById('switchBtn').addEventListener('click', switchLight);

        // Opsional: Auto switch setiap 3 detik (uncomment jika ingin otomatis)
        // setInterval(switchLight, 3000);
    </script>
</body>
</html>
