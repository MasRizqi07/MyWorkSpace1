<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nebula Heart</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Space+Mono:wght@400&display=swap" rel="stylesheet"/>
<style>
  :root {
    --c1: #ff2d8f;
    --c2: #00f5ff;
    --c3: #ffd700;
    --c4: #bf00ff;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #000;
    height: 100vh;
    overflow: hidden;
    cursor: none;
  }

  canvas#bg   { position:fixed; inset:0; z-index:0; }
  canvas#main { position:fixed; inset:0; z-index:1; }

  /* Custom cursor */
  #cursor {
    position: fixed;
    width: 18px; height: 18px;
    border: 1.5px solid rgba(255,255,255,0.7);
    border-radius: 50%;
    pointer-events: none;
    z-index: 999;
    transform: translate(-50%,-50%);
    transition: width .15s, height .15s, border-color .15s;
    mix-blend-mode: difference;
  }
  #cursor.attract { border-color: #00f5ff; width:26px; height:26px; }
  #cursor.repel   { border-color: #ff2d8f; width:26px; height:26px; }

  /* UI overlay */
  #ui {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding-bottom: 28px;
    z-index: 10;
    pointer-events: none;
  }

  #title-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(22px, 3vw, 34px);
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.12em;
    text-shadow: 0 0 30px rgba(255,45,143,0.6), 0 0 60px rgba(0,245,255,0.3);
  }

  #controls {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    pointer-events: all;
    display: flex;
    gap: 24px;
  }

  .ctrl-btn {
    background: none;
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.4);
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    padding: 5px 14px;
    cursor: pointer;
    transition: all .3s;
  }
  .ctrl-btn:hover, .ctrl-btn.active {
    border-color: var(--c2);
    color: var(--c2);
    box-shadow: 0 0 12px rgba(0,245,255,0.3);
  }
  .ctrl-btn.repel-btn.active { border-color: var(--c1); color: var(--c1); box-shadow: 0 0 12px rgba(255,45,143,0.3); }

  #heartbeat-bar {
    width: 120px;
    height: 2px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
  }
  #heartbeat-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--c1), var(--c4));
    transition: width .05s;
  }

  #top-label {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.5em;
    text-transform: uppercase;
    z-index: 10;
    pointer-events: none;
  }
</style>
</head>
<body>

<canvas id="bg"></canvas>
<canvas id="main"></canvas>
<div id="cursor"></div>

<div id="top-label">nebula heart · interactive</div>

<div id="ui">
  <div id="title-text">always & forever</div>
  <div id="controls">
    <button class="ctrl-btn attract-btn active" onclick="setMode('attract')">attract</button>
    <button class="ctrl-btn repel-btn" onclick="setMode('repel')">repel</button>
    <button class="ctrl-btn" onclick="triggerPulse()">pulse</button>
  </div>
  <div id="heartbeat-bar"><div id="heartbeat-fill"></div></div>
</div>

<script>
// ── Canvases ──────────────────────────────────────────────────────────────
const bgCvs  = document.getElementById('bg');
const bgCtx  = bgCvs.getContext('2d');
const cvs    = document.getElementById('main');
const ctx    = cvs.getContext('2d');

function resize() {
  bgCvs.width = cvs.width = window.innerWidth;
  bgCvs.height = cvs.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Custom cursor ─────────────────────────────────────────────────────────
const cursorEl = document.getElementById('cursor');
const mouse = { x: -999, y: -999, mode: 'attract' };

window.addEventListener('mousemove', e => {
  mouse.x = e.clientX; mouse.y = e.clientY;
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top  = e.clientY + 'px';
});

function setMode(m) {
  mouse.mode = m;
  cursorEl.className = m;
  document.querySelector('.attract-btn').classList.toggle('active', m==='attract');
  document.querySelector('.repel-btn').classList.toggle('active', m==='repel');
}

// ── Aurora Background ─────────────────────────────────────────────────────
let bgAngle = 0;
function drawAurora() {
  const W = bgCvs.width, H = bgCvs.height;
  bgCtx.fillStyle = '#00000a';
  bgCtx.fillRect(0, 0, W, H);

  bgAngle += 0.003;
  const t = bgAngle;

  // Layered aurora bands
  const bands = [
    { y: H*0.25, r:120, col: [255,  45, 143, 0.04] },
    { y: H*0.45, r:180, col: [  0, 245, 255, 0.05] },
    { y: H*0.65, r:140, col: [191,   0, 255, 0.04] },
    { y: H*0.55, r:200, col: [255, 215,   0, 0.03] },
  ];

  bands.forEach((b, i) => {
    const cx = W/2 + Math.sin(t + i*1.3) * W*0.25;
    const cy = b.y  + Math.cos(t*0.7 + i) * H*0.12;
    const g = bgCtx.createRadialGradient(cx, cy, 0, cx, cy, b.r + Math.sin(t+i)*40);
    g.addColorStop(0,   `rgba(${b.col[0]},${b.col[1]},${b.col[2]},${b.col[3]})`);
    g.addColorStop(1,   'rgba(0,0,0,0)');
    bgCtx.fillStyle = g;
    bgCtx.fillRect(0, 0, W, H);
  });

  // subtle star field
  if (!bgDrawn) {
    for (let i = 0; i < 200; i++) {
      const sx = Math.random()*W, sy = Math.random()*H;
      const sa = Math.random()*0.5+0.1;
      bgCtx.beginPath();
      bgCtx.arc(sx, sy, Math.random()*0.8+0.2, 0, Math.PI*2);
      bgCtx.fillStyle = `rgba(255,255,255,${sa})`;
      bgCtx.fill();
      stars.push({x:sx, y:sy, a:sa, da: (Math.random()-0.5)*0.01});
    }
    bgDrawn = true;
  }
}

let bgDrawn = false;
const stars = [];
function twinkleStars() {
  stars.forEach(s => {
    s.a += s.da;
    if (s.a > 0.7 || s.a < 0.05) s.da *= -1;
    bgCtx.beginPath();
    bgCtx.arc(s.x, s.y, 0.8, 0, Math.PI*2);
    bgCtx.fillStyle = `rgba(255,255,255,${s.a})`;
    bgCtx.fill();
  });
}

// ── Heart Math ────────────────────────────────────────────────────────────
function hx(t) { return 16*Math.pow(Math.sin(t),3); }
function hy(t) { return -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)); }

// ── Color system ──────────────────────────────────────────────────────────
function lerpColor(a, b, t) {
  return [
    a[0]+(b[0]-a[0])*t,
    a[1]+(b[1]-a[1])*t,
    a[2]+(b[2]-a[2])*t
  ];
}

const COLORS = [
  [255, 45, 143],   // magenta-pink
  [0, 245, 255],    // cyan
  [255, 215, 0],    // gold
  [191, 0, 255],    // violet
  [255, 120, 80],   // coral
];

function getShiftedColor(t, phase) {
  const ct = ((t + phase) % 1 + 1) % 1;
  const n  = COLORS.length;
  const i  = Math.floor(ct * n);
  const f  = ct * n - i;
  const c  = lerpColor(COLORS[i % n], COLORS[(i+1) % n], f);
  return c;
}

// ── Particles ─────────────────────────────────────────────────────────────
class Particle {
  constructor(idx, total) {
    this.idx   = idx;
    this.total = total;
    this.t     = (idx / total) * Math.PI * 2;

    // DNA helix: offset in Z as sine wave along the path
    this.helixOffset = Math.sin(this.t * 6) * 0.5;
    this.helixPhase  = (idx / total);

    const scale = 14;
    this.ox = hx(this.t) * scale;
    this.oy = hy(this.t) * scale;
    this.oz = this.helixOffset;

    this.vx = 0; this.vy = 0;
    this.homeX = this.ox;
    this.homeY = this.oy;

    this.phase  = Math.random() * Math.PI * 2;
    this.size   = Math.random() * 2 + 0.8;
    this.colorT = idx / total;

    this.trail  = [];
    this.pulseR = 0;
  }

  update(angle, cx, cy, beatScale, time) {
    // Heartbeat scale
    const bs = 1 + (beatScale - 1) * 0.9;

    // DNA helix Z oscillation
    this.oz = Math.sin(this.t * 8 + time * 0.003) * 0.6;

    // Rotate Y
    const cosA = Math.cos(angle);
    const sinA = Math.sin(angle);
    const zD   = 70;

    const rx  = this.ox * cosA - this.oz * zD * sinA;
    const rz  = this.ox * sinA + this.oz * zD * cosA;

    const persp = 380 / (380 + rz);
    const sx    = rx * persp * bs + cx;
    const sy    = this.oy * persp * bs + cy;

    // Mouse interaction
    const dx   = sx - mouse.x;
    const dy   = sy - mouse.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const R    = 100;

    if (dist < R) {
      const force = (R - dist) / R;
      if (mouse.mode === 'repel') {
        this.vx += (dx / dist) * force * 1.2;
        this.vy += (dy / dist) * force * 1.2;
      } else {
        this.vx -= (dx / dist) * force * 0.8;
        this.vy -= (dy / dist) * force * 0.8;
      }
    }

    // Spring back
    this.vx += (this.homeX - this.ox) * 0.03;
    this.vy += (this.homeY - this.oy) * 0.03;
    this.vx *= 0.88;
    this.vy *= 0.88;
    this.ox += this.vx;
    this.oy += this.vy;

    // Trail
    this.trail.push({x: sx, y: sy});
    if (this.trail.length > 5) this.trail.shift();

    this.sx    = sx;
    this.sy    = sy;
    this.rz    = rz;
    this.persp = persp;
    this.depthN = (rz + 80) / 160;
  }

  draw(time) {
    if (this.trail.length < 2) return;

    const col    = getShiftedColor(this.colorT, time * 0.0002);
    const twink  = 0.6 + 0.4 * Math.sin(time * 0.003 + this.phase);
    const alpha  = (0.4 + this.depthN * 0.6) * twink;

    // Trail
    for (let i = 1; i < this.trail.length; i++) {
      const ta = (i / this.trail.length) * alpha * 0.4;
      ctx.beginPath();
      ctx.moveTo(this.trail[i-1].x, this.trail[i-1].y);
      ctx.lineTo(this.trail[i].x,   this.trail[i].y);
      ctx.strokeStyle = `rgba(${col[0]},${col[1]},${col[2]},${ta})`;
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }

    // Core dot
    const s = this.size * this.persp * 1.8;
    ctx.beginPath();
    ctx.arc(this.sx, this.sy, Math.max(0.3, s), 0, Math.PI*2);
    ctx.fillStyle = `rgba(${col[0]},${col[1]},${col[2]},${alpha})`;
    ctx.fill();

    // Glow halo for bright particles
    if (this.depthN > 0.55) {
      ctx.beginPath();
      ctx.arc(this.sx, this.sy, s * 3.5, 0, Math.PI*2);
      const gr = ctx.createRadialGradient(this.sx, this.sy, 0, this.sx, this.sy, s*3.5);
      gr.addColorStop(0,   `rgba(${col[0]},${col[1]},${col[2]},${alpha*0.25})`);
      gr.addColorStop(1,   `rgba(${col[0]},${col[1]},${col[2]},0)`);
      ctx.fillStyle = gr;
      ctx.fill();
    }
  }
}

// ── Ripple rings ──────────────────────────────────────────────────────────
const ripples = [];
function addRipple(x, y) {
  ripples.push({ x, y, r: 0, alpha: 0.8, col: COLORS[Math.floor(Math.random()*COLORS.length)] });
}

function updateRipples() {
  for (let i = ripples.length-1; i >= 0; i--) {
    const rp = ripples[i];
    rp.r     += 4;
    rp.alpha -= 0.018;
    if (rp.alpha <= 0) { ripples.splice(i,1); continue; }
    ctx.beginPath();
    ctx.arc(rp.x, rp.y, rp.r, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(${rp.col[0]},${rp.col[1]},${rp.col[2]},${rp.alpha})`;
    ctx.lineWidth = 1.2;
    ctx.stroke();
  }
}

// ── Heartbeat ────────────────────────────────────────────────────────────
let beatScale = 1;
let beatDir   = 1;
let beatTime  = 0;
const BEAT_INTERVAL = 900; // ms between beats
let lastBeat  = 0;
const fillEl  = document.getElementById('heartbeat-fill');

function updateBeat(time) {
  const elapsed = time - lastBeat;
  if (elapsed > BEAT_INTERVAL) {
    lastBeat = time;
    beatDir  = 1;
  }
  beatTime += 0.25 * beatDir;
  if (beatTime > 18) beatDir = -1;
  if (beatTime < 0)  { beatTime = 0; beatDir = 0; }
  beatScale = 1 + Math.sin(beatTime * 0.17) * 0.07 * Math.max(0, 1 - beatTime/18);

  // progress bar
  fillEl.style.width = Math.min(100, (elapsed / BEAT_INTERVAL) * 100) + '%';
}

// ── Manual pulse ─────────────────────────────────────────────────────────
function triggerPulse() {
  lastBeat  = 0;
  beatTime  = 0;
  beatDir   = 1;
  const cx  = cvs.width/2, cy = cvs.height/2 + 10;
  for (let i = 0; i < 3; i++) {
    setTimeout(() => addRipple(cx + (Math.random()-0.5)*60, cy + (Math.random()-0.5)*40), i*120);
  }
}

// ── Click ripple ──────────────────────────────────────────────────────────
cvs.addEventListener('click', e => { addRipple(e.clientX, e.clientY); triggerPulse(); });
cvs.addEventListener('touchstart', e => {
  addRipple(e.touches[0].clientX, e.touches[0].clientY);
  mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY;
}, {passive:true});
cvs.addEventListener('touchend', () => { mouse.x=-999; mouse.y=-999; });

// ── Build particles ───────────────────────────────────────────────────────
const N_PARTICLES = 900;
const particles = Array.from({length: N_PARTICLES}, (_, i) => new Particle(i, N_PARTICLES));

// ── Main render loop ──────────────────────────────────────────────────────
let angle = 0;
let lastBgUpdate = 0;

function render(time) {
  const W = cvs.width, H = cvs.height;
  const cx = W/2, cy = H/2 + 10;

  // ── Background (update every 3 frames for perf)
  if (time - lastBgUpdate > 50) {
    bgCtx.fillStyle = 'rgba(0,0,8,0.15)';
    bgCtx.fillRect(0, 0, W, H);
    drawAurora();
    twinkleStars();
    lastBgUpdate = time;
  }

  // ── Main canvas trail
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(0, 0, W, H);

  angle += 0.009;
  updateBeat(time);

  // Sort by Z
  const projected = particles.map(p => {
    p.update(angle, cx, cy, beatScale, time);
    return p;
  }).sort((a,b) => a.rz - b.rz);

  // Draw screen-blend glow layer first
  ctx.globalCompositeOperation = 'screen';
  projected.forEach(p => {
    if (p.depthN < 0.5) return;
    const col = getShiftedColor(p.colorT, time*0.0002);
    const s   = p.size * p.persp * 6;
    ctx.beginPath();
    ctx.arc(p.sx, p.sy, s, 0, Math.PI*2);
    ctx.fillStyle = `rgba(${col[0]},${col[1]},${col[2]},0.04)`;
    ctx.fill();
  });
  ctx.globalCompositeOperation = 'source-over';

  // Draw particles
  projected.forEach(p => p.draw(time));

  // Ripples
  updateRipples();

  requestAnimationFrame(render);
}

// ── Kick off ──────────────────────────────────────────────────────────────
drawAurora();
requestAnimationFrame(render);
</script>
</body>
</html>
