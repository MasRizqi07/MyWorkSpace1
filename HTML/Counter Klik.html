<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter Klik</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        #counter {
            font-size: 24px;
            margin: 20px;
        }
    </style>
</head>
<body>
    <h1>Counter Klik</h1>
    <p>Klik tombol di bawah untuk menambah angka:</p>
    <div id="counter">0</div>
    <button onclick="incrementCounter()">Klik Saya!</button>

    <script>
        let count = 0;
        function incrementCounter() {
            count++;
            document.getElementById('counter').innerText = count;
        }
    </script>
</body>
</html>
